name: trustgreen
description: "Trust Green Wallet — multi-chain crypto wallet (Flutter rebuild)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Network
  dio: ^5.7.0
  # `http` is needed by web3dart's Web3Client constructor; pinned
  # explicitly so the API surface we use is stable across upgrades.
  http: ^1.2.2

  # Crypto / HD wallet
  bip39: ^1.0.6
  bip32: ^2.0.0
  web3dart: ^2.7.3
  crypto: ^3.0.6
  convert: ^3.1.2
  pointycastle: ^3.9.1

  # Camera / scanning
  mobile_scanner: ^6.0.7

  # QR display
  qr_flutter: ^4.1.0

  # WebView (browser tab)
  webview_flutter: ^4.10.0

  # Charts (market tab)
  fl_chart: ^0.69.2

  # UX polish
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1

  # Misc
  intl: ^0.19.0
  collection: ^1.18.0
  url_launcher: ^6.3.1
  flutter_dotenv: ^5.2.1

  # Native splash plugin — used both as a CLI to generate assets and
  # at runtime to preserve / remove the splash around bootstrap. Must
  # live in regular `dependencies` (not dev_dependencies) because we
  # import it from app code (see lib/main.dart, BootScreen).
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # CLI-only — generates Android / iOS launcher icons.
  flutter_launcher_icons: ^0.14.4

  # Used by `tool/build_brand_assets.dart` to pre-pad the logo for
  # Android adaptive icons and the Android 12+ splash mask.
  image: ^4.5.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/chains/
    - .env

# ── Adaptive launcher icons ───────────────────────────────────────
# Pre-Android-26 + iOS fall back to `image_path` (the un-padded
# logo). Android 8+ uses the padded foreground on a solid black
# background that matches `AppColors.bg`.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/app_logo_foreground.png"
  background_color_ios: "#000000"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# ── Native splash ─────────────────────────────────────────────────
# Centered logo on the same #000000 background the Flutter UI uses,
# so the handoff from splash → first frame is invisible.
flutter_native_splash:
  color: "#000000"
  image: assets/images/app_logo_foreground.png
  color_dark: "#000000"
  image_dark: assets/images/app_logo_foreground.png
  android: true
  ios: true
  web: false
  fullscreen: false
  android_12:
    color: "#000000"
    image: assets/images/app_logo_foreground.png
    color_dark: "#000000"
    image_dark: assets/images/app_logo_foreground.png
